[pytest]
pythonpath = .
asyncio_mode = strict
asyncio_default_fixture_loop_scope = function
timeout = 30
timeout_method = thread
testpaths = tests
norecursedirs = common .git __pycache__ *.egg

python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    --cov=routers --cov=services --cov=utils --cov=mcp_server
    --cov-report=term-missing
    --cov-report=html
    -n auto

filterwarnings =
    error
    ignore::pytest.PytestUnraisableExceptionWarning
    ignore:.*pkg_resources.*:DeprecationWarning
    ignore:.*declare_namespace.*:DeprecationWarning
    ignore:.*datetime.utcnow.*:DeprecationWarning
    ignore:.*datetime.utcfromtimestamp.*:DeprecationWarning

[coverage:run]
source = .
omit = */tests/*, common/*, */common/*
