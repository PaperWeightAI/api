[pytest]
pythonpath = .
asyncio_mode = strict
asyncio_default_fixture_loop_scope = function
timeout = 30
timeout_method = thread
testpaths = tests
norecursedirs = common .git __pycache__ *.egg
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    -n auto

filterwarnings =
    ignore:pkg_resources is deprecated:DeprecationWarning
